services:
  nas-controller:
    build: .
    image: nas-controller:latest
    container_name: nas-controller
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS:-}
      - NAVIDROME_URL=http://host.docker.internal:4533
      - NAVIDROME_USER=sebastien
      - NAVIDROME_PASS=sebastien
      - DOWNLOADS_DIR=/media/sdb/Musics/Soulseek
      - SLSKD_URL=http://host.docker.internal:5030
      - SLSKD_API_KEY=cff949683de044ba885fa83b1d01b5d07eca5fd47f00afd4
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /media/sdb:/media/sdb
      - /DATA/AppData/beets:/DATA/AppData/beets
      - /DATA/AppData/nas-controller:/DATA/AppData/nas-controller
      - /usr/bin/docker:/usr/bin/docker:ro
      - /DATA/AppData/navidrome:/DATA/AppData/navidrome
      - /DATA/homelab-setup:/DATA/homelab-setup
      - /DATA/.ssh:/DATA/.ssh:ro
      - ./data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1

  deploy-agent:
    build:
      context: /DATA/AppData/nas-controller/deploy
      dockerfile: Dockerfile
    image: deploy-agent:latest
    container_name: deploy-agent
    restart: unless-stopped
    ports:
      - "8889:8889"
    environment:
      - DEPLOY_SECRET=${DEPLOY_SECRET:-}
    volumes:
      - /DATA/homelab-setup:/DATA/homelab-setup
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/.ssh:/DATA/.ssh:ro
      - /DATA/AppData/nas-controller/deploy:/deploy
      - /DATA/AppData/nas-controller:/DATA/AppData/nas-controller
      - /DATA/AppData/beets:/DATA/AppData/beets
      - /DATA/AppData/navidrome:/DATA/AppData/navidrome
      - /usr/bin/docker:/usr/bin/docker:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
